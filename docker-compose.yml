services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - artifacts:/data/artifacts
    environment:
      PP_DATABASE_URL: postgresql+asyncpg://patternproof:patternproof@postgres:5432/patternproof
      PP_REDIS_URL: redis://redis:6379/0
      PP_OLLAMA_BASE_URL: http://ollama:11434
      PP_ML_INFERENCE_URL: http://ml-inference:8001
      PP_STORAGE_DIR: /data/artifacts
      PP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    volumes:
      - ./backend:/app
      - artifacts:/data/artifacts
    environment:
      PP_DATABASE_URL: postgresql+asyncpg://patternproof:patternproof@postgres:5432/patternproof
      PP_REDIS_URL: redis://redis:6379/0
      PP_OLLAMA_BASE_URL: http://ollama:11434
      PP_ML_INFERENCE_URL: http://ml-inference:8001
      PP_STORAGE_DIR: /data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── ML Inference Service ──────────────────────────────────────────────
  ml-inference:
    build: ./ml
    ports:
      - "8001:8001"
    volumes:
      - ./ml:/app

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: patternproof
      POSTGRES_PASSWORD: patternproof
      POSTGRES_DB: patternproof
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patternproof"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Ollama (LLM serving) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  artifacts:
  ollama_data:
