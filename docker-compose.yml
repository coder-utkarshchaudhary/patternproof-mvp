services:
  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      PP_REDIS_URL: redis://redis:6379/0
      PP_ML_INFERENCE_URL: http://ml-inference:8001
    depends_on:
      redis:
        condition: service_started

  # ── Celery Worker (runs the agent pipeline) ─────────────────────────────
  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      PP_REDIS_URL: redis://redis:6379/0
      PP_ML_INFERENCE_URL: http://ml-inference:8001
    depends_on:
      redis:
        condition: service_started
    # ml-inference is contacted via HTTP at runtime only — not a hard startup dep.

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── ML Inference Service (YOLO) ─────────────────────────────────────────
  ml-inference:
    build: ./ml/app
    ports:
      - "8001:8001"
    volumes:
      - ./ml:/app

  # ── Redis (Celery broker) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"